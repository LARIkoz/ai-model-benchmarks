name: Validate Data

on:
  pull_request:
    paths:
      - "data/**"
      - "scripts/validate.py"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate JSON schema
        run: python scripts/validate.py

      - name: Validate JSON syntax (all data files)
        run: |
          for f in data/*.json; do
            python -m json.tool "$f" > /dev/null && echo "OK: $f" || exit 1
          done
